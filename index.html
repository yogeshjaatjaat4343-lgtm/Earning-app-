<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EARNING APP</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin:20px auto;
border-radius:15px;
max-width:500px;
}

button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#00bfff;
color:white;
}

#history{
text-align:left;
}

</style>

</head>

<body>

<h1>🔥 EARNING APP 🔥</h1>

<div class="card">

<h2>Login</h2>

<button id="loginBtn">

Login With Google

</button>

<p id="userText">

Not Logged In

</p>

</div>

<div class="card">

<h2>Wallet</h2>

<h1>

🪙 <span id="coins">0</span>

</h1>

</div>

<div class="card">

<h2>📋 Surveys</h2>

<a href="https://loot-link.com/s?GDfddiyb" target="_blank">

<button>

Open LootLabs

</button>

</a>

</div>

<div class="card">

<h2>🎁 Offerwall</h2>

<a href="https://adswedmedia.com/offer/qomMMngj/[USER_ID]" target="_blank">

<button>

Open AdswedMedia

</button>

</a>

</div>

<div class="card">

<h2>💸 Withdraw</h2>

<button id="withdrawBtn">

Request Withdraw

</button>

</div>

<div class="card">

<h2>📜 History</h2>

<div id="history">

No history

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
onSnapshot,
arrayUnion
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyCl2Zut4rcT11Z_sTOUcY6-62AzxaCbAp4",
  authDomain: "earningapp-f5159.firebaseapp.com",
  projectId: "earningapp-f5159",
  storageBucket: "earningapp-f5159.firebasestorage.app",
  messagingSenderId: "12919105584",
  appId: "1:12919105584:web:1e2602778c926d426625f5"
};
const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

let currentUser=null;

document.getElementById("loginBtn").onclick=async()=>{

const provider=new GoogleAuthProvider();

const result=await signInWithPopup(auth,provider);

currentUser=result.user;

document.getElementById("userText").innerText=currentUser.email;

const ref=doc(db,"users",currentUser.uid);

const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{

email:currentUser.email,

coins:0,

history:[]

});

}

onSnapshot(ref,(data)=>{

const d=data.data();

document.getElementById("coins").innerText=d.coins||0;

let html="";

if(d.history.length===0){

html="No history";

}else{

d.history.forEach(item=>{

html+=item+"<br>";

});

}

document.getElementById("history").innerHTML=html;

});

};

document.getElementById("withdrawBtn").onclick=async()=>{

if(!currentUser){

alert("Login first");

return;

}

const ref=doc(db,"users",currentUser.uid);

await updateDoc(ref,{

history:arrayUnion("Withdraw request sent")

});

alert("Request Added");

};

</script>

</body>

</html>
