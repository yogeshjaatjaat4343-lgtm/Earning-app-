<!DOCTYPE html>
<html>

<head>

<title>EARNING APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
margin:20px;
padding:20px;
border-radius:18px;
}

.title{
font-size:30px;
color:#00ffcc;
margin-bottom:20px;
}

button{

width:90%;

max-width:300px;

padding:15px;

margin:10px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:linear-gradient(45deg,#00ffcc,#0077ff);

color:white;

}

.coins{

font-size:25px;

color:gold;

}

.historyItem{

padding:10px;

border-bottom:1px solid #444;

}

</style>

</head>

<body>

<!-- HOME PAGE -->

<div id="homePage" class="container">

<div class="title">

🔥 EARNING APP 🔥

</div>

<!-- LOGIN -->

<div class="card">

<h2>Login</h2>

<button onclick="login()">

Login With Google

</button>

<p id="userText">

Not Logged In

</p>

</div>

<!-- WALLET -->

<div class="card">

<h2>Wallet</h2>

<div class="coins">

Coins :

<span id="coins">

0

</span>

</div>

</div>

<!-- WITHDRAW -->

<div class="card">

<h2>Withdraw</h2>

<button onclick="withdraw()">

Request Withdraw

</button>

</div>

<!-- HISTORY -->

<div class="card">

<h2>History</h2>

<button onclick="openHistory()">

Open History

</button>

</div>

<!-- SURVEYS -->

<div class="card">

<h2>📋 Surveys</h2>

<p>

LootLabs link यहाँ आएगी

</p>

<button>

Coming Soon

</button>

</div>

<!-- OFFERWALL -->

<div class="card">

<h2>🎁 Offerwall</h2>

<p>

EarnHive link यहाँ आएगी

</p>

<button>

Coming Soon

</button>

</div>

<!-- ADS -->

<div class="card">

<h2>📢 Ads</h2>

<p>

Yllix code यहाँ आएगा

</p>

</div>

</div>

<!-- HISTORY PAGE -->

<div

id="historyPage"

class="container"

style="display:none;"

>

<div class="title">

📜 HISTORY

</div>

<div

id="historyContent"

class="card"

>

❌ No History Found

</div>

<button onclick="goHome()">

⬅ Back

</button>

</div>

<script>

let loggedIn=false;

let historyData=[];

function login(){

loggedIn=true;

document.getElementById("userText").innerText="Logged In";

alert("Firebase login बाद में जोड़ेंगे");

}

function withdraw(){

if(!loggedIn){

alert("Login first");

return;

}

historyData.push({

amount:100,

status:"Pending"

});

alert("Withdraw request added");

}

function openHistory(){

document.getElementById("homePage").style.display="none";

document.getElementById("historyPage").style.display="block";

const box=document.getElementById("historyContent");

if(historyData.length===0){

box.innerHTML="❌ No History Found";

return;

}

let html="";

historyData.forEach(item=>{

html+=`

<div class="historyItem">

💰 Amount : ${item.amount}

<br>

📌 Status : ${item.status}

</div>

`;

});

box.innerHTML=html;

}

function goHome(){

document.getElementById("historyPage").style.display="none";

document.getElementById("homePage").style.display="block";

}

</script>

</body>

</html>
